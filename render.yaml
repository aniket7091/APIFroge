services:
  # Node.js Backend API
  - type: web
    name: apiforge-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Render will prompt you to enter this in the dashboard
      - key: JWT_SECRET
        generateValue: true

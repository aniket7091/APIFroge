name: apiforge
description: "APIForge - A powerful API testing tool similar to Postman"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # HTTP Client
  dio: ^5.4.1

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.2.3

  # Fonts
  google_fonts: ^6.2.1

  # Syntax highlighting
  flutter_highlight: ^0.7.0

  # JSON
  json_annotation: ^4.9.0

  # Icons
  cupertino_icons: ^1.0.8

  # URL launcher
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/logo/